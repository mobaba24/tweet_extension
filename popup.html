<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tweet Scraper - By Ali Jahani</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1a1a1a;
      border: 1px solid #444;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
    }

    h3 {
      margin: 0 0 20px;
      font-size: 1.5em;
      font-weight: 600;
      color: #fff;
    }

    label {
      font-size: 1em;
      margin-bottom: 10px;
      display: inline-block;
    }

    input[type="number"] {
      width: calc(100% - 20px);
      padding: 10px;
      font-size: 1em;
      margin: 10px 0;
      border: 1px solid #444;
      border-radius: 5px;
      background-color: #111;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 1em;
      font-weight: bold;
      color: #fff;
      background-color: #444;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #555;
    }

    button:active {
      background-color: #666;
    }

    footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #888;
    }

    footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.3s;
    }

    footer a:hover {
      color: #fff;
    }

    .fields {
      margin: 12px 0 0;
      font-size: 0.8em;
      line-height: 1.4;
      color: #aaa;
    }

    .fields strong {
      color: #fff;
    }

    .option {
      text-align: left;
      margin: 14px 0 4px;
      font-size: 0.95em;
    }

    .option label {
      display: block;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 1em;
      border: 1px solid #444;
      border-radius: 5px;
      background-color: #111;
      color: #fff;
      cursor: pointer;
    }

    .hint {
      margin: 6px 0 0;
      font-size: 0.78em;
      color: #888;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>X Scraper</h3>
    <label for="scrollLimit">Scroll Limit:</label>
    <input type="number" id="scrollLimit" placeholder="e.g., 10" />
    <div class="option">
      <label for="imageFilter">Image filter:</label>
      <select id="imageFilter">
        <option value="all">All posts</option>
        <option value="any">Only posts with an image</option>
        <option value="like">Only images like the sample (people/portraits)</option>
      </select>
      <p class="hint">"Like the sample" analyses each photo's pixels and keeps only
        person/portrait-style images (the class learned from the sample set).</p>
    </div>
    <button id="startScraping">Start Scraping</button>
    <p class="fields">Exports <strong>JSON + CSV</strong> per tweet: username,
      <strong>@handle</strong>, <strong>gender</strong>, date, likes, comments,
      retweets, views, <strong>image(s)</strong> &amp; text.</p>
    <footer>
      <p>Developed by <a href="https://jahaniwww.com" target="_blank">Ali Jahani</a></p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
